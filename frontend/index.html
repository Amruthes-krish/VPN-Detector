<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VPN Detector</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#0a0c10; --bg2:#111520; --bg3:#181d2a;
    --border:#1e2535; --border2:#2a3348;
    --text:#c8d0e0; --muted:#5a6480;
    --accent:#3b82f6; --accent2:#60a5fa;
    --green:#22c55e; --yellow:#eab308; --red:#ef4444;
    --mono:'IBM Plex Mono',monospace; --sans:'Space Grotesk',sans-serif;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; display:flex; flex-direction:column; align-items:center; }
  body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(59,130,246,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.03) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
  .wrap { position:relative; z-index:1; width:100%; max-width:900px; padding:40px 24px 80px; }

  /* header */
  header { margin-bottom:36px; }
  .logo-row { display:flex; align-items:center; gap:12px; margin-bottom:6px; }
  .logo-icon { width:36px; height:36px; border:1.5px solid var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px; }
  h1 { font-family:var(--mono); font-size:22px; font-weight:600; color:#fff; }
  .tagline { font-family:var(--mono); font-size:12px; color:var(--muted); }

  /* tabs */
  .tabs { display:flex; gap:4px; margin-bottom:28px; background:var(--bg2); border:1.5px solid var(--border2); border-radius:12px; padding:4px; width:fit-content; }
  .tab { font-family:var(--mono); font-size:12px; padding:8px 18px; border-radius:8px; cursor:pointer; color:var(--muted); border:none; background:transparent; transition:all 0.2s; }
  .tab.active { background:var(--accent); color:#fff; }
  .tab:hover:not(.active) { color:var(--text); }

  /* panels */
  .panel { display:none; }
  .panel.active { display:block; }

  /* single lookup */
  .input-row { display:flex; gap:10px; margin-bottom:20px; }
  .ip-input { flex:1; background:var(--bg2); border:1.5px solid var(--border2); border-radius:10px; padding:14px 18px; font-family:var(--mono); font-size:15px; color:#fff; outline:none; transition:border-color 0.2s; }
  .ip-input::placeholder { color:var(--muted); }
  .ip-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(59,130,246,0.1); }
  .lookup-btn { background:var(--accent); color:#fff; border:none; border-radius:10px; padding:14px 28px; font-family:var(--mono); font-size:14px; font-weight:600; cursor:pointer; transition:background 0.2s,transform 0.1s; white-space:nowrap; }
  .lookup-btn:hover { background:var(--accent2); }
  .lookup-btn:active { transform:scale(0.97); }
  .lookup-btn:disabled { opacity:0.5; cursor:not-allowed; }

  .examples { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:28px; align-items:center; }
  .examples span { font-family:var(--mono); font-size:11px; color:var(--muted); }
  .chip { font-family:var(--mono); font-size:11px; background:var(--bg3); border:1px solid var(--border2); border-radius:6px; padding:4px 10px; color:var(--accent2); cursor:pointer; transition:border-color 0.15s,color 0.15s; }
  .chip:hover { border-color:var(--accent); color:#fff; }

  /* result card */
  .card { background:var(--bg2); border:1.5px solid var(--border2); border-radius:16px; overflow:hidden; animation:fadeUp 0.35s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .verdict-banner { padding:20px 24px; display:flex; align-items:center; justify-content:space-between; border-bottom:1.5px solid var(--border); gap:16px; }
  .verdict-banner.high   { background:rgba(239,68,68,0.08); }
  .verdict-banner.medium { background:rgba(234,179,8,0.07); }
  .verdict-banner.low    { background:rgba(34,197,94,0.07); }
  .verdict-left { display:flex; align-items:center; gap:14px; }
  .verdict-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
  .high .verdict-dot   { background:var(--red);    box-shadow:0 0 8px var(--red); }
  .medium .verdict-dot { background:var(--yellow); box-shadow:0 0 8px var(--yellow); }
  .low .verdict-dot    { background:var(--green);  box-shadow:0 0 8px var(--green); }
  .verdict-text { font-family:var(--mono); font-size:17px; font-weight:600; color:#fff; }
  .verdict-sub  { font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:2px; }
  .score-pill { font-family:var(--mono); font-size:13px; font-weight:600; padding:6px 14px; border-radius:20px; border:1.5px solid; white-space:nowrap; }
  .high .score-pill   { color:var(--red);    border-color:var(--red);    background:rgba(239,68,68,0.1); }
  .medium .score-pill { color:var(--yellow); border-color:var(--yellow); background:rgba(234,179,8,0.1); }
  .low .score-pill    { color:var(--green);  border-color:var(--green);  background:rgba(34,197,94,0.1); }
  .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:0; }
  .info-cell { padding:18px 24px; border-bottom:1px solid var(--border); border-right:1px solid var(--border); }
  .info-cell:nth-child(even) { border-right:none; }
  .info-cell:nth-last-child(-n+2) { border-bottom:none; }
  .cell-label { font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:0.8px; text-transform:uppercase; margin-bottom:6px; }
  .cell-value { font-family:var(--mono); font-size:14px; color:#fff; font-weight:500; word-break:break-all; }
  .cell-value.dim { color:var(--muted); font-style:italic; }
  .flags-row { padding:16px 24px; border-top:1.5px solid var(--border); display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .flags-label { font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:0.8px; text-transform:uppercase; margin-right:4px; }
  .flag-tag { font-family:var(--mono); font-size:11px; padding:3px 10px; border-radius:6px; font-weight:500; }
  .flag-tag.vpn     { background:rgba(239,68,68,0.15); color:#f87171; border:1px solid rgba(239,68,68,0.3); }
  .flag-tag.dc      { background:rgba(234,179,8,0.12);  color:#fbbf24; border:1px solid rgba(234,179,8,0.3); }
  .flag-tag.clean   { background:rgba(34,197,94,0.12);  color:#4ade80; border:1px solid rgba(34,197,94,0.3); }
  .flag-tag.neutral { background:rgba(90,100,128,0.2);  color:var(--muted); border:1px solid var(--border2); }
  .source-row { padding:12px 24px; border-top:1px solid var(--border); display:flex; gap:8px; flex-wrap:wrap; }
  .source-badge { font-family:var(--mono); font-size:10px; padding:3px 9px; border-radius:5px; color:var(--muted); border:1px solid var(--border2); }
  .source-badge.active { color:var(--accent2); border-color:rgba(59,130,246,0.35); }
  .score-bar-wrap { padding:16px 24px; border-top:1px solid var(--border); }
  .score-bar-label { font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:0.8px; text-transform:uppercase; margin-bottom:8px; }
  .score-bar-track { height:6px; background:var(--bg3); border-radius:3px; overflow:hidden; }
  .score-bar-fill  { height:100%; border-radius:3px; transition:width 0.6s ease; }
  .high .score-bar-fill   { background:var(--red); }
  .medium .score-bar-fill { background:var(--yellow); }
  .low .score-bar-fill    { background:var(--green); }

  /* bulk panel */
  .bulk-textarea { width:100%; background:var(--bg2); border:1.5px solid var(--border2); border-radius:10px; padding:16px 18px; font-family:var(--mono); font-size:13px; color:#fff; outline:none; resize:vertical; min-height:140px; transition:border-color 0.2s; }
  .bulk-textarea::placeholder { color:var(--muted); }
  .bulk-textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(59,130,246,0.1); }
  .bulk-actions { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
  .btn { font-family:var(--mono); font-size:13px; font-weight:600; padding:11px 22px; border-radius:10px; border:none; cursor:pointer; transition:all 0.2s; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:var(--accent2); }
  .btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
  .btn-outline { background:transparent; color:var(--accent2); border:1.5px solid var(--border2); }
  .btn-outline:hover { border-color:var(--accent); color:#fff; }
  .btn-outline:disabled { opacity:0.5; cursor:not-allowed; }
  .btn-green { background:rgba(34,197,94,0.15); color:var(--green); border:1.5px solid rgba(34,197,94,0.3); }
  .btn-green:hover { background:rgba(34,197,94,0.25); }
  .btn-green:disabled { opacity:0.4; cursor:not-allowed; }
  .progress-bar-wrap { margin-top:16px; display:none; }
  .progress-bar-track { height:4px; background:var(--bg3); border-radius:2px; overflow:hidden; }
  .progress-bar-fill  { height:100%; background:var(--accent); border-radius:2px; transition:width 0.3s ease; }
  .progress-label { font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:6px; }

  /* results table */
  .table-wrap { margin-top:24px; overflow-x:auto; border-radius:12px; border:1.5px solid var(--border2); }
  table { width:100%; border-collapse:collapse; font-family:var(--mono); font-size:12px; }
  thead tr { background:var(--bg3); }
  th { padding:12px 14px; text-align:left; color:var(--muted); font-size:10px; letter-spacing:0.8px; text-transform:uppercase; border-bottom:1px solid var(--border2); white-space:nowrap; }
  td { padding:11px 14px; border-bottom:1px solid var(--border); color:var(--text); white-space:nowrap; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(59,130,246,0.04); }
  .badge { font-size:10px; padding:2px 8px; border-radius:5px; font-weight:600; }
  .badge.high   { background:rgba(239,68,68,0.15); color:#f87171; }
  .badge.medium { background:rgba(234,179,8,0.12);  color:#fbbf24; }
  .badge.low    { background:rgba(34,197,94,0.12);  color:#4ade80; }

  /* history panel */
  .history-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .history-title { font-family:var(--mono); font-size:14px; color:#fff; font-weight:600; }
  .history-empty { font-family:var(--mono); font-size:13px; color:var(--muted); text-align:center; padding:48px 0; }

  /* loading / error */
  .loading { text-align:center; padding:48px; font-family:var(--mono); color:var(--muted); font-size:13px; }
  .spinner { display:inline-block; width:20px; height:20px; border:2px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; margin-bottom:12px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .error-box { background:rgba(239,68,68,0.08); border:1.5px solid rgba(239,68,68,0.25); border-radius:12px; padding:20px 24px; font-family:var(--mono); font-size:13px; color:#f87171; }

  @media(max-width:520px) {
    .info-grid { grid-template-columns:1fr; }
    .info-cell { border-right:none !important; }
    .info-cell:nth-last-child(-n+2) { border-bottom:1px solid var(--border); }
    .info-cell:last-child { border-bottom:none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo-row">
      <div class="logo-icon">🔍</div>
      <h1>vpn_detector</h1>
    </div>
    <div class="tagline">// ip intelligence · vpn detection · provider lookup</div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('single')">Single Lookup</button>
    <button class="tab" onclick="switchTab('bulk')">Bulk Lookup</button>
    <button class="tab" onclick="switchTab('history')">History</button>
  </div>

  <!-- ── SINGLE LOOKUP ── -->
  <div class="panel active" id="panel-single">
    <div class="input-row">
      <input class="ip-input" id="ipInput" type="text" placeholder="Enter IP address  e.g. 185.220.101.1" autocomplete="off" spellcheck="false"/>
      <button class="lookup-btn" id="lookupBtn" onclick="singleLookup()">Lookup →</button>
    </div>
    <div class="examples">
      <span>try:</span>
      <span class="chip" onclick="tryIp('185.220.101.1')">185.220.101.1</span>
      <span class="chip" onclick="tryIp('104.28.0.1')">104.28.0.1</span>
      <span class="chip" onclick="tryIp('8.8.8.8')">8.8.8.8</span>
      <span class="chip" onclick="tryIp('1.1.1.1')">1.1.1.1</span>
      <span class="chip" onclick="tryMyIp()">my IP</span>
    </div>
    <div id="single-result"></div>
  </div>

  <!-- ── BULK LOOKUP ── -->
  <div class="panel" id="panel-bulk">
    <textarea class="bulk-textarea" id="bulkInput" placeholder="Paste IPs here, one per line or comma-separated&#10;&#10;185.220.101.1&#10;8.8.8.8&#10;1.1.1.1&#10;103.86.96.100"></textarea>
    <div class="bulk-actions">
      <button class="btn btn-primary" id="bulkBtn" onclick="bulkLookup()">Run Bulk Lookup</button>
      <button class="btn btn-green" id="exportBtn" onclick="exportCSV()" disabled>Export CSV</button>
      <button class="btn btn-outline" onclick="clearBulk()">Clear</button>
    </div>
    <div class="progress-bar-wrap" id="bulkProgress">
      <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-label" id="progressLabel">Processing...</div>
    </div>
    <div id="bulk-result"></div>
  </div>

  <!-- ── HISTORY ── -->
  <div class="panel" id="panel-history">
    <div class="history-header">
      <span class="history-title">Lookup History</span>
      <button class="btn btn-outline" onclick="clearHistory()" style="padding:7px 14px;font-size:12px;">Clear All</button>
    </div>
    <div id="history-content"></div>
  </div>

</div>

<script>
const API = '';
let bulkResults = [];
let history = JSON.parse(localStorage.getItem('vpn_history') || '[]');

// ── Tab switching ──────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['single','bulk','history'][i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'history') renderHistory();
}

// ── Single lookup ──────────────────────────────────────────────────────────
async function singleLookup(ipOverride) {
  const ip = ipOverride || document.getElementById('ipInput').value.trim();
  if (!ip) return;
  const resultEl = document.getElementById('single-result');
  const btn = document.getElementById('lookupBtn');
  btn.disabled = true;
  resultEl.innerHTML = `<div class="card"><div class="loading"><div class="spinner"></div><br/>looking up ${ip}...</div></div>`;
  try {
    const res = await fetch(`${API}/api/lookup/${encodeURIComponent(ip)}`);
    if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'Lookup failed'); }
    const data = await res.json();
    resultEl.innerHTML = buildCard(data);
    addToHistory(data);
  } catch(e) {
    resultEl.innerHTML = `<div class="error-box">⚠ ${e.message}</div>`;
  } finally { btn.disabled = false; }
}

function tryIp(ip) { document.getElementById('ipInput').value = ip; singleLookup(ip); }

async function tryMyIp() {
  try {
    const r = await fetch('https://api.ipify.org?format=json');
    const { ip } = await r.json();
    tryIp(ip);
  } catch { alert('Could not detect your IP'); }
}

document.getElementById('ipInput').addEventListener('keydown', e => { if(e.key==='Enter') singleLookup(); });

// ── Bulk lookup ────────────────────────────────────────────────────────────
async function bulkLookup() {
  const raw = document.getElementById('bulkInput').value.trim();
  if (!raw) return;
  const ips = raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
  if (ips.length === 0) return;
  if (ips.length > 100) { alert('Maximum 100 IPs per request'); return; }

  const btn = document.getElementById('bulkBtn');
  const exportBtn = document.getElementById('exportBtn');
  const progress = document.getElementById('bulkProgress');
  const fill = document.getElementById('progressFill');
  const label = document.getElementById('progressLabel');
  const resultEl = document.getElementById('bulk-result');

  btn.disabled = true;
  exportBtn.disabled = true;
  progress.style.display = 'block';
  fill.style.width = '0%';
  label.textContent = `Processing 0 / ${ips.length}...`;
  resultEl.innerHTML = '';
  bulkResults = [];

  for (let i = 0; i < ips.length; i++) {
    try {
      const res = await fetch(`${API}/api/lookup/${encodeURIComponent(ips[i])}`);
      const data = await res.json();
      bulkResults.push(data);
      addToHistory(data);
    } catch {
      bulkResults.push({ ip: ips[i], error: 'Failed', detection: { verdict:'Error', level:'low', score:0, flags:[] } });
    }
    const pct = Math.round(((i+1)/ips.length)*100);
    fill.style.width = pct + '%';
    label.textContent = `Processing ${i+1} / ${ips.length}...`;
  }

  label.textContent = `Done — ${bulkResults.length} IPs processed`;
  btn.disabled = false;
  exportBtn.disabled = false;
  renderBulkTable(bulkResults, resultEl);
}

function renderBulkTable(results, el) {
  const rows = results.map(r => {
    const det = r.detection || {};
    const flags = (det.flags||[]).join(', ') || '—';
    return `<tr>
      <td style="color:#fff;font-weight:500">${r.ip}</td>
      <td><span class="badge ${det.level||'low'}">${det.verdict||'—'}</span></td>
      <td>${det.score ?? '—'}</td>
      <td>${r.org||'—'}</td>
      <td>${r.country||'—'}</td>
      <td>${r.city||'—'}</td>
      <td>${r.asn||'—'}</td>
      <td style="color:var(--muted)">${flags}</td>
    </tr>`;
  }).join('');
  el.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>IP</th><th>Verdict</th><th>Score</th><th>Provider</th>
          <th>Country</th><th>City</th><th>ASN</th><th>Signals</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function clearBulk() {
  document.getElementById('bulkInput').value = '';
  document.getElementById('bulk-result').innerHTML = '';
  document.getElementById('bulkProgress').style.display = 'none';
  document.getElementById('exportBtn').disabled = true;
  bulkResults = [];
}

// ── CSV Export ─────────────────────────────────────────────────────────────
function exportCSV() {
  if (!bulkResults.length) return;
  const headers = ['IP','Verdict','Risk Score','Level','ASN','Provider/Org','ISP','Country','City','Timezone','Latitude','Longitude','Flags','MMDB Available'];
  const rows = bulkResults.map(r => {
    const det = r.detection || {};
    return [
      r.ip, det.verdict, det.score, det.level,
      r.asn, r.org, r.isp,
      r.country, r.city, r.timezone,
      r.latitude, r.longitude,
      (det.flags||[]).join('; '),
      r.mmdb_available
    ].map(v => `"${(v??'').toString().replace(/"/g,'""')}"`).join(',');
  });
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'vpn_lookup_results.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ── History ────────────────────────────────────────────────────────────────
function addToHistory(data) {
  const entry = { ...data, timestamp: new Date().toISOString() };
  history = [entry, ...history.filter(h => h.ip !== data.ip)].slice(0, 200);
  localStorage.setItem('vpn_history', JSON.stringify(history));
}

function renderHistory() {
  const el = document.getElementById('history-content');
  if (!history.length) {
    el.innerHTML = '<div class="history-empty">No lookups yet. Start by looking up an IP.</div>';
    return;
  }
  const rows = history.map(r => {
    const det = r.detection || {};
    const ts = new Date(r.timestamp).toLocaleString();
    return `<tr>
      <td style="color:var(--muted);font-size:11px">${ts}</td>
      <td style="color:#fff;font-weight:500">${r.ip}</td>
      <td><span class="badge ${det.level||'low'}">${det.verdict||'—'}</span></td>
      <td>${det.score ?? '—'}</td>
      <td>${r.org||'—'}</td>
      <td>${r.country||'—'}</td>
      <td>${r.city||'—'}</td>
      <td>
        <span style="cursor:pointer;color:var(--accent2);font-size:11px" onclick="replayLookup('${r.ip}')">lookup →</span>
      </td>
    </tr>`;
  }).join('');
  el.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Time</th><th>IP</th><th>Verdict</th><th>Score</th>
          <th>Provider</th><th>Country</th><th>City</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function replayLookup(ip) {
  switchTab('single');
  document.getElementById('ipInput').value = ip;
  singleLookup(ip);
}

function clearHistory() {
  history = [];
  localStorage.setItem('vpn_history', '[]');
  renderHistory();
}

// ── Result card builder ────────────────────────────────────────────────────
function buildCard(d) {
  const det = d.detection || {};
  const level = det.level || 'low';
  const score = det.score || 0;
  const flags = det.flags || [];
  const flagHtml = flags.length
    ? flags.map(f => {
        let cls = 'neutral';
        if (['vpn_flag','known_vpn_provider','proxy'].includes(f)) cls = 'vpn';
        if (['datacenter','hosting'].includes(f)) cls = 'dc';
        return `<span class="flag-tag ${cls}">${f.replace(/_/g,' ')}</span>`;
      }).join('')
    : '<span class="flag-tag clean">clean</span>';
  const val = (v, fallback='—') => v || `<span class="dim">${fallback}</span>`;
  return `
    <div class="card ${level}">
      <div class="verdict-banner ${level}">
        <div class="verdict-left">
          <div class="verdict-dot"></div>
          <div>
            <div class="verdict-text">${det.verdict}</div>
            <div class="verdict-sub">${d.ip} · ${d.org}</div>
          </div>
        </div>
        <div class="score-pill">Risk ${score}/100</div>
      </div>
      <div class="score-bar-wrap ${level}">
        <div class="score-bar-label">VPN Confidence Score</div>
        <div class="score-bar-track"><div class="score-bar-fill" style="width:${score}%"></div></div>
      </div>
      <div class="info-grid">
        <div class="info-cell"><div class="cell-label">IP Address</div><div class="cell-value">${d.ip}</div></div>
        <div class="info-cell"><div class="cell-label">ASN</div><div class="cell-value">${val(d.asn)}</div></div>
        <div class="info-cell"><div class="cell-label">Provider / Org</div><div class="cell-value">${val(d.org)}</div></div>
        <div class="info-cell"><div class="cell-label">ISP</div><div class="cell-value">${val(d.isp)}</div></div>
        <div class="info-cell"><div class="cell-label">Country</div><div class="cell-value">${d.country_code ? d.country_code+' · ' : ''}${val(d.country)}</div></div>
        <div class="info-cell"><div class="cell-label">City</div><div class="cell-value">${val(d.city)}</div></div>
        <div class="info-cell"><div class="cell-label">Coordinates</div><div class="cell-value">${d.latitude ? d.latitude.toFixed(4)+', '+d.longitude.toFixed(4) : '<span class="dim">—</span>'}</div></div>
        <div class="info-cell"><div class="cell-label">Timezone</div><div class="cell-value">${val(d.timezone)}</div></div>
      </div>
      <div class="flags-row">
        <span class="flags-label">Signals</span>${flagHtml}
      </div>
      <div class="source-row">
        <span class="source-badge ${d.mmdb_available ? 'active' : ''}">
          ${d.mmdb_available ? '✓' : '✗'} MaxMind MMDB
        </span>
        <span class="source-badge ${d.raw_ip_api && d.raw_ip_api.status==='success' ? 'active' : ''}">
          ${d.raw_ip_api && d.raw_ip_api.status==='success' ? '✓' : '✗'} ip-api.com
        </span>
      </div>
    </div>`;
}
</script>
</body>
</html>

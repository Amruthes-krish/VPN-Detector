services:
  - type: web
    name: vpn-detector
    runtime: python
    buildCommand: pip install -r requirements.txt && python download_mmdb.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MAXMIND_LICENSE_KEY
        sync: false
